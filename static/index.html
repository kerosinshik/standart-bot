<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат-бот по нормативным документам</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .status {
            padding: 12px 24px;
            background: #f7fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
            color: #4a5568;
        }

        .status.loading {
            background: #fef3c7;
            color: #92400e;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f7fafc;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: white;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            text-align: left;
        }

        .message.bot .message-content ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message.bot .message-content li {
            margin: 4px 0;
        }

        .message.bot .message-content strong {
            color: #1a202c;
            font-weight: 600;
        }

        .message.bot .message-content p {
            margin: 6px 0;
        }

        .sources {
            margin-top: 12px;
            padding: 12px;
            background: #edf2f7;
            border-radius: 8px;
            font-size: 13px;
            color: #4a5568;
        }

        .sources strong {
            display: block;
            margin-bottom: 6px;
            color: #2d3748;
        }

        .sources ul {
            margin-left: 20px;
        }

        .sources li {
            margin-bottom: 4px;
        }

        .input-container {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }

        #questionInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        #questionInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendButton {
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #e53e3e;
            background: #fff5f5;
            border: 1px solid #feb2b2;
        }

        .empty-state {
            text-align: center;
            color: #a0aec0;
            padding: 60px 20px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #4a5568;
        }

        .empty-state p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Чат-бот по нормативным документам</h1>
            <p>Задайте вопрос по загруженным документам</p>
            <div style="margin-top: 12px; display: flex; gap: 20px; align-items: center;">
                <div>
                    <label for="aiProvider" style="margin-right: 8px; font-size: 13px;">AI Модель:</label>
                    <select id="aiProvider" style="padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.2); color: white; font-size: 13px; cursor: pointer;">
                        <option value="zai">Z.ai (GLM-4.6)</option>
                        <option value="claude">Claude 3.5 Sonnet</option>
                    </select>
                </div>
                <div>
                    <label for="knowledgeMode" style="margin-right: 8px; font-size: 13px;">Режим:</label>
                    <select id="knowledgeMode" style="padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.2); color: white; font-size: 13px; cursor: pointer;">
                        <option value="strict">📄 Только документы</option>
                        <option value="expanded">🧠 Документы + Общие знания AI</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="status" class="status">Подключение к серверу...</div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                </svg>
                <h3>Готов ответить на ваши вопросы</h3>
                <p>Введите вопрос в поле ниже</p>
            </div>
        </div>

        <div class="input-container">
            <input
                type="text"
                id="questionInput"
                placeholder="Введите ваш вопрос..."
                autocomplete="off"
            />
            <button id="sendButton" style="padding: 14px 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;">Отправить</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const questionInput = document.getElementById('questionInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');
        const aiProviderSelect = document.getElementById('aiProvider');
        const knowledgeModeSelect = document.getElementById('knowledgeMode');

        let isFirstMessage = true;
        let conversationHistory = [];  // История диалога (последние 2-3 сообщения)

        // Проверка здоровья сервера при загрузке
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();

                if (data.status === 'ok') {
                    if (data.documents_count === 0) {
                        statusDiv.textContent = '⚠️ База данных пуста. Загрузите PDF файлы через init_db.py';
                        statusDiv.classList.add('loading');
                    } else {
                        statusDiv.textContent = `✓ Готов к работе | PDF: ${data.documents_count} | Фрагментов: ${data.chunks_count}`;
                        statusDiv.style.background = '#d1fae5';
                        statusDiv.style.color = '#065f46';
                    }
                }
            } catch (error) {
                statusDiv.textContent = '⚠️ Ошибка подключения к серверу';
                statusDiv.classList.add('loading');
            }
        }

        // Улучшенный парсер Markdown
        function parseMarkdown(text) {
            // Сначала экранируем HTML
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Жирный текст
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Курсив
            text = text.replace(/\*([^*]+?)\*/g, '<em>$1</em>');

            // Разбиваем на строки для обработки списков
            let lines = text.split('\n');
            let html = [];
            let inList = false;

            for (let line of lines) {
                // Список с дефисом
                if (line.match(/^-\s+(.+)$/)) {
                    if (!inList) {
                        html.push('<ul>');
                        inList = true;
                    }
                    html.push('<li>' + line.replace(/^-\s+/, '') + '</li>');
                }
                // Нумерованный список
                else if (line.match(/^\d+\.\s+(.+)$/)) {
                    if (!inList) {
                        html.push('<ol>');
                        inList = true;
                    }
                    html.push('<li>' + line.replace(/^\d+\.\s+/, '') + '</li>');
                }
                // Обычная строка
                else {
                    if (inList) {
                        html.push('</ul>');
                        inList = false;
                    }
                    if (line.trim() === '') {
                        html.push('<br>');
                    } else {
                        html.push('<p>' + line + '</p>');
                    }
                }
            }

            // Закрываем список если остался открытым
            if (inList) {
                html.push('</ul>');
            }

            return html.join('');
        }

        // Добавление сообщения в чат
        function addMessage(text, isUser, sources = null, metrics = null) {
            if (isFirstMessage) {
                chatContainer.innerHTML = '';
                isFirstMessage = false;
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Для ботов рендерим Markdown, для пользователей - обычный текст
            if (!isUser) {
                contentDiv.innerHTML = parseMarkdown(text);
            } else {
                contentDiv.textContent = text;
            }

            messageDiv.appendChild(contentDiv);

            // Добавляем метрики если есть
            if (metrics) {
                const metricsDiv = document.createElement('div');
                metricsDiv.className = 'sources';
                metricsDiv.style.background = '#fef3c7';

                const tokens = metrics.tokens || {};
                const aiProviderName = metrics.ai_provider === 'claude' ? 'Claude 3.5 Sonnet' : 'Z.ai GLM-4.6';

                metricsDiv.innerHTML = `
                    <strong>Метрики запроса:</strong>
                    <ul style="margin: 4px 0;">
                        <li>AI Модель: ${aiProviderName}</li>
                        <li>Поиск: ${metrics.search_time_ms} мс</li>
                        <li>AI ответ: ${metrics.ai_time_ms} мс</li>
                        <li>Общее время: ${metrics.total_time_ms} мс</li>
                        <li>Токены: ${tokens.total_tokens || 0} (промпт: ${tokens.prompt_tokens || 0}, ответ: ${tokens.completion_tokens || 0})</li>
                        ${metrics.has_history ? '<li>📜 Использован контекст диалога</li>' : ''}
                    </ul>
                `;

                messageDiv.appendChild(metricsDiv);
            }

            // Не показываем отдельный блок источников - AI уже указывает их в тексте ответа

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Показать индикатор загрузки
        function showLoader() {
            const loaderDiv = document.createElement('div');
            loaderDiv.className = 'message bot';
            loaderDiv.id = 'loader';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="loader"></div>';

            loaderDiv.appendChild(contentDiv);
            chatContainer.appendChild(loaderDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Удалить индикатор загрузки
        function removeLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.remove();
            }
        }

        // Отправка вопроса
        async function sendQuestion() {
            const question = questionInput.value.trim();

            if (!question) return;

            // Добавляем вопрос пользователя в историю
            conversationHistory.push({
                role: 'user',
                content: question
            });

            // Оставляем только последние 6 сообщений (3 пары вопрос-ответ)
            if (conversationHistory.length > 6) {
                conversationHistory = conversationHistory.slice(-6);
            }

            // Добавляем вопрос пользователя в интерфейс
            addMessage(question, true);
            questionInput.value = '';

            // Блокируем кнопку
            sendButton.disabled = true;
            showLoader();

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        conversation_history: conversationHistory,
                        ai_provider: aiProviderSelect.value,
                        knowledge_mode: knowledgeModeSelect.value
                    })
                });

                const data = await response.json();

                removeLoader();

                if (data.success) {
                    // Добавляем ответ в историю
                    conversationHistory.push({
                        role: 'assistant',
                        content: data.answer
                    });

                    addMessage(data.answer, false, data.sources, data.metrics);
                } else {
                    addMessage(`Ошибка: ${data.error || 'Не удалось получить ответ'}`, false);
                }

            } catch (error) {
                removeLoader();
                addMessage('Ошибка связи с сервером. Проверьте подключение.', false);
            } finally {
                sendButton.disabled = false;
                questionInput.focus();
            }
        }

        // Обработчики событий
        sendButton.addEventListener('click', () => sendQuestion());

        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendQuestion();
            }
        });

        // Проверяем здоровье при загрузке
        checkHealth();
        questionInput.focus();
    </script>
</body>
</html>
